version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: animal_finder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./animal_finder_backend
    restart: unless-stopped
    env_file:
      - ./animal_finder_backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./animal_finder_backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"

  ai-server:
    build: ./pythonProject6
    restart: unless-stopped
    env_file:
      - ./pythonProject6/.env
    environment:
      - BACKEND_URL=http://backend:8000
      - TORCH_HOME=/app/.torch_hub
    ports:
      - "8001:8001"
    volumes:
      - ./pythonProject6:/app
    depends_on:
      - backend

  vk-bot:
    build: ./pythonProject6
    restart: unless-stopped
    env_file:
      - ./pythonProject6/.env
    environment:
      - BACKEND_URL=http://backend:8000
      - AI_SERVER_URL=http://ai-server:8001/search_similar
      - PYTHONUNBUFFERED=1
    command: ["python", "-u", "vk_bot_full.py"]
    depends_on:
      - backend
      - ai-server

  frontend:
    build: ./Pet-Finder-Hub/artifacts/pet-finder
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
      - ai-server

volumes:
  pg_data:
  media_data:
