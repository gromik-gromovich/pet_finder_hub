packages:
  "leaflet": "Interactive maps for pet locations"
  "react-leaflet": "React bindings for Leaflet"
  "@types/leaflet": "Types for Leaflet"
  "date-fns": "Date formatting and manipulation"
  "framer-motion": "Smooth animations for cards and page transitions"
  "react-hook-form": "Form state management"
  "@hookform/resolvers": "Zod validation resolver for forms"
  "zod": "Schema validation"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for conditionally joining Tailwind CSS classes"

images:
  - path: "artifacts/pet-finder/public/images/logo-icon.png"
    description: "A minimal, cute, line-art style icon of a cat and dog side by side in a gentle pastel teal color, suitable for a logo mark, transparent background."
    aspect_ratio: "1:1"

notes:
  - Using localStorage for all data persistence to mimic a backend.
  - Using react-leaflet with custom DivIcons instead of default image markers to avoid missing asset issues.
